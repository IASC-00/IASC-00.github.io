<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ian Swain — Job Listings Dashboard</title>
<link rel="canonical" href="https://iswain.dev/demos/job-listings.html">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #1A7A7A;
    --teal-light: #e8f5f5;
    --teal-mid: #2a9d9d;
    --dark: #1a1a1a;
    --gray: #555;
    --light: #f7fafa;
    --border: #d0e8e8;
    --white: #fff;
    --remote-bg: #e8f5f0;
    --remote-color: #1a7a55;
    --philly-bg: #eef2ff;
    --philly-color: #3344aa;
    --balt-bg: #fff4e8;
    --balt-color: #aa5500;
    --dc-bg: #ffeef2;
    --dc-color: #aa1a44;
    --other-bg: #f5f5f5;
    --other-color: #555;
  }

  body {
    font-family: "DM Sans", sans-serif;
    background: var(--light);
    color: var(--dark);
    min-height: 100vh;
  }

  header {
    background: var(--teal);
    color: white;
    padding: 28px 32px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  header h1 {
    font-family: "DM Serif Display", serif;
    font-size: 28px;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  header p {
    font-size: 13px;
    opacity: 0.8;
    margin-top: 4px;
  }

  #total-badge {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
  }

  .controls {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-wrap input {
    width: 100%;
    padding: 9px 14px 9px 36px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: "DM Sans", sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--teal); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
    font-size: 14px;
  }

  .filter-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: white;
    font-family: "DM Sans", sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--gray);
  }

  .filter-btn:hover { border-color: var(--teal); color: var(--teal); }

  .filter-btn.active {
    background: var(--teal);
    border-color: var(--teal);
    color: white;
  }

  .filter-btn.btn-remote.active { background: var(--remote-color); border-color: var(--remote-color); }
  .filter-btn.btn-philly.active { background: var(--philly-color); border-color: var(--philly-color); }
  .filter-btn.btn-balt.active   { background: var(--balt-color); border-color: var(--balt-color); }
  .filter-btn.btn-dc.active     { background: var(--dc-color); border-color: var(--dc-color); }

  .sort-select {
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: "DM Sans", sans-serif;
    font-size: 13px;
    color: var(--gray);
    outline: none;
    cursor: pointer;
    background: white;
  }

  .sort-select:focus { border-color: var(--teal); }

  main { padding: 24px 32px; max-width: 1200px; margin: 0 auto; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 24px 0 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
  }

  .section-header h2 {
    font-family: "DM Serif Display", serif;
    font-size: 18px;
    color: var(--teal);
  }

  .section-count {
    background: var(--teal-light);
    color: var(--teal);
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .jobs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }

  .job-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    transition: box-shadow 0.15s, transform 0.15s;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .job-card:hover {
    box-shadow: 0 4px 16px rgba(26,122,122,0.12);
    transform: translateY(-1px);
  }

  .job-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--dark);
    line-height: 1.3;
  }

  .job-company {
    font-size: 13px;
    color: var(--teal-mid);
    font-weight: 500;
  }

  .job-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .tag {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .tag-remote  { background: var(--remote-bg); color: var(--remote-color); }
  .tag-philly  { background: var(--philly-bg); color: var(--philly-color); }
  .tag-balt    { background: var(--balt-bg);   color: var(--balt-color); }
  .tag-dc      { background: var(--dc-bg);     color: var(--dc-color); }
  .tag-other   { background: var(--other-bg);  color: var(--other-color); }
  .tag-source  { background: #f0f0f0; color: #666; }

  .job-location {
    font-size: 12px;
    color: var(--gray);
  }

  .apply-btn {
    margin-top: auto;
    display: inline-block;
    padding: 7px 14px;
    background: var(--teal);
    color: white;
    text-decoration: none;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    transition: background 0.15s;
    align-self: flex-start;
  }

  .apply-btn:hover { background: var(--teal-mid); }

  #no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray);
    display: none;
  }

  #no-results p { font-size: 18px; margin-bottom: 8px; }
  #no-results small { font-size: 13px; }

  .stats-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: white;
  }

  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  @media (max-width: 600px) {
    header, .controls, main { padding-left: 16px; padding-right: 16px; }
    .jobs-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div style="background:#1a7a7a;color:rgba(255,255,255,.65);padding:9px 20px;font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:12px;font-family:'DM Sans',sans-serif;"><a href="https://iswain.dev" style="color:#fff;font-weight:600;text-decoration:none;white-space:nowrap;">← iswain.dev</a><span style="text-align:center;">Job Search Tracker &mdash; live listings dashboard</span><a href="https://iswain.dev/#projects" style="color:#fff;font-weight:600;text-decoration:none;white-space:nowrap;">View portfolio →</a></div>

<header>
  <div>

<div class="controls">

  </div>
  <div class="filter-btns">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>

    <button class="filter-btn btn-philly" onclick="setFilter('Philadelphia Area', this)">Philadelphia</button>
    <button class="filter-btn btn-balt" onclick="setFilter('Baltimore Area', this)">Baltimore</button>
    <button class="filter-btn btn-dc" onclick="setFilter('Washington DC Area', this)">Washington DC</button>
  </div>
  <select class="sort-select" id="sort-select" onchange="filterJobs()">
    <option value="region">Sort by Location</option>
    <option value="title">Sort by Title</option>
    <option value="company">Sort by Company</option>
    <option value="source">Sort by Source</option>
  </select>
</div>

<main>
  <div class="stats-bar" id="stats-bar"></div>
  <div id="sections-container"></div>
  <div id="no-results">
    <p>No listings found</p>
    <small>Try a different search term or filter</small>
  </div>
</main>

;

const REGION_ORDER = ['Remote', 'Philadelphia Area', 'Baltimore Area', 'Washington DC Area', 'Other'];
const REGION_TAGS = {
  'Remote':              'tag-remote',
  'Philadelphia Area':   'tag-philly',
  'Baltimore Area':      'tag-balt',
  'Washington DC Area':  'tag-dc',
  'Other':               'tag-other'
};
const REGION_DOTS = {
  'Remote':            '#1a7a55',
  'Philadelphia Area': '#3344aa',
  'Baltimore Area':    '#aa5500',
  'Washington DC Area':'#aa1a44',
  'Other':             '#888'
};

let activeFilter = 'all';

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterJobs();
}

function filterJobs() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const sortBy = document.getElementById('sort-select').value;

  let filtered = JOBS.filter(j => {
    const matchFilter = activeFilter === 'all' || j.region === activeFilter;
    const matchSearch = !query ||
      j.title.toLowerCase().includes(query) ||
      j.company.toLowerCase().includes(query) ||
      j.location.toLowerCase().includes(query) ||
      j.source.toLowerCase().includes(query);
    return matchFilter && matchSearch;
  });

  // Sort
  if (sortBy === 'region') {
    filtered.sort((a, b) => REGION_ORDER.indexOf(a.region) - REGION_ORDER.indexOf(b.region) || a.title.localeCompare(b.title));
  } else {
    filtered.sort((a, b) => a[sortBy].localeCompare(b[sortBy]));
  }

  renderJobs(filtered, sortBy === 'region');
  renderStats(filtered);
  document.getElementById('total-badge').textContent = filtered.length + ' listings';
}

function renderStats(jobs) {
  const counts = {};
  jobs.forEach(j => counts[j.region] = (counts[j.region] || 0) + 1);
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = REGION_ORDER
    .filter(r => counts[r])
    .map(r => `<div class="stat-pill">
      <span class="stat-dot" style="background:${REGION_DOTS[r]}"></span>
      <strong>${counts[r]}</strong> ${r}
    </div>`).join('');
}

function renderJobs(jobs, groupByRegion) {
  const container = document.getElementById('sections-container');
  const noResults = document.getElementById('no-results');

  if (!jobs.length) {
    container.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  if (groupByRegion) {
    const groups = {};
    jobs.forEach(j => {
      if (!groups[j.region]) groups[j.region] = [];
      groups[j.region].push(j);
    });

    container.innerHTML = REGION_ORDER
      .filter(r => groups[r] && groups[r].length)
      .map(r => `
        <div class="section-header">
          <h2>${r}</h2>
          <span class="section-count">${groups[r].length}</span>
        </div>
        <div class="jobs-grid">${groups[r].map(jobCard).join('')}</div>
      `).join('');
  } else {
    container.innerHTML = `<div class="jobs-grid">${jobs.map(jobCard).join('')}</div>`;
  }
}

function jobCard(j) {
  const tagClass = REGION_TAGS[j.region] || 'tag-other';
  const regionLabel = j.region === 'Remote' ? '&#127758; Remote' : j.region;
  const co = j.company === 'N/A' ? '' : `<div class="job-company">${esc(j.company)}</div>`;
  return `<div class="job-card">
    <div class="job-title">${esc(j.title)}</div>
    ${co}
    <div class="job-meta">
      <span class="tag ${tagClass}">${regionLabel}</span>
      <span class="tag tag-source">${esc(j.source)}</span>
    </div>
    <div class="job-location">&#128205; ${esc(j.location) || 'Location not specified'}</div>
    <a class="apply-btn" href="${esc(j.link)}" target="_blank" rel="noopener">View &amp; Apply &rarr;</a>
  </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
filterJobs();
</script>
